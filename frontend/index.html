<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bookgen Image Lab</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, Arial, sans-serif;
        background: #101317;
        color: #f2f5f7;
      }
      body {
        margin: 0;
        background: linear-gradient(180deg, #101317 0%, #161b22 100%);
      }
      .app {
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px;
        display: grid;
        grid-template-columns: 380px minmax(0, 1fr);
        gap: 24px;
      }
      .panel, .viewer {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 18px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }
      p, label, input, textarea, button {
        font: inherit;
      }
      .muted {
        color: #b9c2cc;
        margin: 0 0 18px;
      }
      .field {
        display: grid;
        gap: 8px;
        margin-bottom: 14px;
      }
      input, textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: #0c1015;
        color: #f2f5f7;
        border-radius: 6px;
        padding: 12px;
      }
      textarea {
        min-height: 148px;
        resize: vertical;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      button {
        border: 0;
        background: #5bd4a8;
        color: #08110d;
        font-weight: 600;
        border-radius: 6px;
        padding: 12px 16px;
        cursor: pointer;
      }
      button:disabled {
        cursor: progress;
        opacity: 0.7;
      }
      .status {
        margin-top: 16px;
        padding: 12px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.04);
        min-height: 88px;
        white-space: pre-wrap;
      }
      .viewer {
        min-height: 720px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 14px;
      }
      .viewer-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .image-wrap {
        display: grid;
        place-items: center;
        background: #0c1015;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        overflow: hidden;
        min-height: 640px;
      }
      img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .placeholder {
        color: #8f9aa5;
        text-align: center;
        max-width: 360px;
        line-height: 1.5;
      }
      code {
        background: rgba(255, 255, 255, 0.06);
        padding: 2px 6px;
        border-radius: 4px;
      }
      @media (max-width: 960px) {
        .app {
          grid-template-columns: 1fr;
        }
        .viewer {
          min-height: 0;
        }
        .image-wrap {
          min-height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <h1>Bookgen Image Lab</h1>
        <p class="muted">Write a prompt, launch a generation job, and poll until the image is ready.</p>

        <div class="field">
          <label for="apiUrl">API URL</label>
          <input id="apiUrl" type="text" placeholder="https://xxxx.execute-api.eu-west-1.amazonaws.com">
        </div>

        <div class="field">
          <label for="prompt">Prompt</label>
          <textarea id="prompt">A tiny fox reading under a glowing tree, storybook illustration, warm light, highly detailed</textarea>
        </div>

        <div class="field">
          <label for="style">Style</label>
          <input id="style" type="text" value="storybook">
        </div>

        <div class="row">
          <div class="field">
            <label for="width">Width</label>
            <input id="width" type="number" value="768" min="512" step="64">
          </div>
          <div class="field">
            <label for="height">Height</label>
            <input id="height" type="number" value="768" min="512" step="64">
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="steps">Steps</label>
            <input id="steps" type="number" value="30" min="10" max="50">
          </div>
          <div class="field">
            <label for="guidance">Guidance</label>
            <input id="guidance" type="number" value="7" min="1" max="20" step="0.5">
          </div>
        </div>

        <button id="generateBtn" type="button">Generate Image</button>
        <div id="status" class="status">Ready.</div>
      </section>

      <section class="viewer">
        <div class="viewer-meta">
          <div>
            <div>Current job: <code id="jobId">none</code></div>
            <div>Status: <code id="jobStatus">idle</code></div>
          </div>
        </div>
        <div class="image-wrap" id="imageWrap">
          <div class="placeholder">Your generated image will appear here as soon as the worker finishes the job.</div>
        </div>
      </section>
    </main>

    <script>
      const apiUrlInput = document.getElementById("apiUrl");
      const promptInput = document.getElementById("prompt");
      const styleInput = document.getElementById("style");
      const widthInput = document.getElementById("width");
      const heightInput = document.getElementById("height");
      const stepsInput = document.getElementById("steps");
      const guidanceInput = document.getElementById("guidance");
      const generateBtn = document.getElementById("generateBtn");
      const statusBox = document.getElementById("status");
      const jobIdBox = document.getElementById("jobId");
      const jobStatusBox = document.getElementById("jobStatus");
      const imageWrap = document.getElementById("imageWrap");

      const savedApiUrl = localStorage.getItem("bookgen_api_url");
      if (savedApiUrl) {
        apiUrlInput.value = savedApiUrl;
      }

      function setStatus(message) {
        statusBox.textContent = message;
      }

      function setImage(url) {
        imageWrap.innerHTML = "";
        const img = document.createElement("img");
        img.src = url;
        img.alt = "Generated image";
        imageWrap.appendChild(img);
      }

      function clearImage() {
        imageWrap.innerHTML = '<div class="placeholder">Your generated image will appear here as soon as the worker finishes the job.</div>';
      }

      async function fetchJob(apiBase, jobId) {
        const response = await fetch(`${apiBase}/jobs/${jobId}`);
        if (!response.ok) {
          throw new Error(`Status fetch failed (${response.status})`);
        }
        return response.json();
      }

      async function pollJob(apiBase, jobId) {
        const job = await fetchJob(apiBase, jobId);
        jobStatusBox.textContent = job.status || "unknown";
        setStatus(`Job ${jobId}\nStatus: ${job.status}\nUpdated: ${job.updated_at || "n/a"}`);

        if (job.status === "completed" && job.image_url) {
          setImage(job.image_url);
          return;
        }

        if (job.status === "failed") {
          throw new Error(job.error || "Generation failed");
        }

        window.setTimeout(() => {
          pollJob(apiBase, jobId).catch((error) => {
            setStatus(`Polling error: ${error.message}`);
          });
        }, 5000);
      }

      generateBtn.addEventListener("click", async () => {
        const apiBase = apiUrlInput.value.trim().replace(/\/$/, "");
        if (!apiBase) {
          setStatus("Please enter the API URL first.");
          return;
        }

        localStorage.setItem("bookgen_api_url", apiBase);
        generateBtn.disabled = true;
        clearImage();
        setStatus("Sending job...");

        try {
          const payload = {
            prompt: promptInput.value.trim(),
            style: styleInput.value.trim(),
            width: Number(widthInput.value),
            height: Number(heightInput.value),
            num_inference_steps: Number(stepsInput.value),
            guidance_scale: Number(guidanceInput.value),
          };

          const response = await fetch(`${apiBase}/jobs/sdxl`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            throw new Error(`Job creation failed (${response.status})`);
          }

          const data = await response.json();
          const jobId = data.job_id;
          jobIdBox.textContent = jobId;
          jobStatusBox.textContent = data.status || "queued";
          setStatus(`Job ${jobId} created.\nWaiting for worker...`);

          await pollJob(apiBase, jobId);
        } catch (error) {
          setStatus(`Error: ${error.message}`);
        } finally {
          generateBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
